phase: semantic

corpus:
  categories: ["cs.CV", "cs.LG", "cs.AI"]
  keywords:
    - "out of distribution detection"
    - "visual anomaly detection"
    - "novel category discovery"
    - "open world recognition"
    - "DINO anomaly"
    - "self-supervised anomaly detection"
    - "prototype based OOD"
    - "interpretable computer vision"
  date_from: "2019-01-01"
  date_to:   "2025-12-31"
  max_results: 8000

ingestion:
  paths:
    pdf_dir:       data/raw/arxiv_pdfs_semantic
    papers:        data/processed/semantic_papers.jsonl
    parsed_papers: data/processed/semantic_parsed_papers.jsonl
    raw_chunks:    data/processed/semantic_raw_chunks.jsonl
  download:
    concurrency:     10
    timeout_seconds: 30
  chunking:
    strategy:      section
    max_words:     400
    overlap_words: 50

index:
  chunks:        data/processed/cleaned_semantic_chunks.jsonl
  artifact_dir:  artifacts/indexes/semantic
  type:          HNSW32
  vector_backend: faiss

model:
  embedding: sentence-transformers/all-mpnet-base-v2
  llm:
    fast:   {model: "qwen3.5:9b",        provider: ollama}
    medium: {model: "qwen3.6:27b",       provider: ollama}
    strong: {model: "deepseek-chat",     provider: openai}
    best:   {model: "claude-sonnet-4-6", provider: anthropic}

evaluation:
  test_set:        data/processed/semantic_test_queries.json
  ragas_responses: data/processed/semantic_ragas_responses.json
  log_dir:         logs/ragas_evaluation/semantic
  batch_size:      10
  experiment_name: RAGAS_Evaluation_semantic
