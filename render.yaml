services:
  - type: web
    name: researchmind-api
    runtime: docker
    dockerfilePath: api/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: CONFIG_NAME
        value: demo
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_DSN
        sync: false
